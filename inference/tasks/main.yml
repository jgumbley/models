---
# Update system packages
- name: Update apt cache
  apt:
    update_cache: yes
  become: yes
  tags: inference

# Install basic dependencies
- name: Install dependencies
  apt:
    name:
      - build-essential
      - cmake
      - git
      - wget
      - python3
      - python3-venv
      - libopenblas-dev
      - libcurl4-openssl-dev
      - libgtk-3-dev
      - lm-sensors
      - linux-tools-common
      - linux-tools-generic
      - alsa-utils
    state: present
  become: yes

# ROCm Installation - Always from scratch
- name: Remove all existing ROCm-related packages
  shell: apt-get remove --purge -y $(dpkg -l | grep -E "(rocm|hip)" | awk '{print $2}') || true
  become: yes
  failed_when: false

- name: Clean package cache and autoremove
  apt:
    autoremove: yes
    autoclean: yes
    update_cache: yes
  become: yes

- name: Remove existing ROCm directory
  file:
    path: /opt/rocm
    state: absent
  become: yes

- name: Add AMD ROCm repository key
  apt_key:
    url: https://repo.radeon.com/rocm/rocm.gpg.key
    state: present
  become: yes

- name: Add AMD ROCm repository
  apt_repository:
    repo: "deb [arch=amd64] https://repo.radeon.com/rocm/apt/6.4.2 noble main"
    state: present
    update_cache: yes
  become: yes

- name: Create apt preferences for ROCm packages
  copy:
    content: |
      Package: *
      Pin: origin repo.radeon.com
      Pin-Priority: 1001
    dest: /etc/apt/preferences.d/rocm
  become: yes

- name: Install ROCm packages for RX 7900 XT/XTX
  apt:
    name:
      - rocm
      - rocm-hip-sdk
      - rocblas
      - hipblas
      - hipblaslt
      - rocwmma-dev
    state: present
    update_cache: yes
    force: yes
  become: yes

- name: Create ROCm environment configuration
  lineinfile:
    path: /etc/environment
    line: "{{ item }}"
    create: yes
  become: yes
  loop:
    - "ROC_ENABLE_PRE_VEGA=1"
    - "HIP_VISIBLE_DEVICES=0,1"
    - "ROCM_PATH=/opt/rocm"

# llama.cpp Installation - Always from scratch
- name: Remove existing llama.cpp directory
  file:
    path: /opt/llama.cpp
    state: absent
  become: yes

- name: Clone llama.cpp repository from latest HEAD
  git:
    repo: https://github.com/ggerganov/llama.cpp.git
    dest: /opt/llama.cpp
    version: HEAD
    force: yes
  become: yes

- name: Configure llama.cpp build with ROCm support
  command: cmake -B build -DGGML_HIP=ON -DGGML_OPENBLAS=OFF -DAMDGPU_TARGETS=gfx1100
  args:
    chdir: /opt/llama.cpp
  environment:
    ROCM_PATH: /opt/rocm
    HIP_PATH: /opt/rocm
    HIPCXX: "/opt/rocm/lib/llvm/bin/clang++"
    PATH: "/opt/rocm/bin:{{ ansible_env.PATH }}"
  become: yes

- name: Build llama.cpp with ROCm support
  command: cmake --build build -j{{ ansible_processor_vcpus }}
  args:
    chdir: /opt/llama.cpp
  environment:
    ROCM_PATH: /opt/rocm
    HIP_PATH: /opt/rocm
    HIPCXX: "/opt/rocm/lib/llvm/bin/clang++"
    PATH: "/opt/rocm/bin:{{ ansible_env.PATH }}"
  become: yes

# Additional monitoring tools
- name: Install additional monitoring tools
  apt:
    name:
      - htop
      - iotop
      - powertop
      - sysstat
      - s-tui
      - stress
    state: present
  become: yes

# User permissions and system configuration
- name: Add user to render and video groups for GPU access
  user:
    name: system
    groups: render,video
    append: yes
  become: yes

# Create symlinks for easy access
# whisper.cpp Installation - Always from scratch
- name: Remove existing whisper.cpp directory
  file:
    path: /opt/whisper.cpp
    state: absent
  become: yes

- name: Clone whisper.cpp repository from latest HEAD
  git:
    repo: https://github.com/ggerganov/whisper.cpp.git
    dest: /opt/whisper.cpp
    version: HEAD
    force: yes
  become: yes

- name: Configure whisper.cpp build
  command: cmake -B build
  args:
    chdir: /opt/whisper.cpp
  become: yes

- name: Build whisper.cpp
  command: cmake --build build -j{{ ansible_processor_vcpus }}
  args:
    chdir: /opt/whisper.cpp
  become: yes

- name: Create symlinks in /usr/local/bin for easy access
  file:
    src: /opt/llama.cpp/build/bin/{{ item }}
    dest: /usr/local/bin/{{ item }}
    state: link
    force: yes
  become: yes
  loop:
    - llama-cli
    - llama-server

- name: Create whisper.cpp symlink in /usr/local/bin
  file:
    src: /opt/whisper.cpp/build/bin/main
    dest: /usr/local/bin/whisper-cpp
    state: link
    force: yes
  become: yes

# Verification
- name: Verify ROCm installation
  command: rocminfo
  register: rocm_info
  become: yes
  failed_when: false

- name: Check for gfx1100 GPU target
  shell: rocminfo | grep gfx | head -1
  register: gpu_target
  become: yes
  failed_when: false

- name: Display GPU target information
  debug:
    msg: "GPU Target: {{ gpu_target.stdout }}"
  when: gpu_target.stdout is defined

- name: Display installation completion status
  debug:
    msg: "Inference environment installation completed. All components built from latest sources."
