---
# Update system packages
- name: Update apt cache
  apt:
    update_cache: yes
  become: yes
  tags: inference

# Install basic dependencies
- name: Install dependencies
  apt:
    name:
      - build-essential
      - cmake
      - g++-14
      - gpg
      - git
      - lowdown
      - wget
      - python3
      - python3-venv
      - libopenblas-dev
      - libcurl4-openssl-dev
      - libgtk-3-dev
      - lm-sensors
      - linux-tools-common
      - linux-tools-generic
      - alsa-utils
    state: present
  become: yes

# ROCm 7 installation - always from scratch
- name: Find installed ROCm meta packages
  shell: dpkg-query -W -f='${Package}\n' | grep -E '^(rocm|hip)'
  register: rocm_packages_to_remove
  changed_when: false
  failed_when: rocm_packages_to_remove.rc not in [0, 1]
  become: yes

- name: Remove installed ROCm meta packages
  apt:
    name: "{{ rocm_packages_to_remove.stdout_lines }}"
    state: absent
    purge: yes
  when: rocm_packages_to_remove.stdout_lines | length > 0
  become: yes

- name: Clean package cache and autoremove
  apt:
    autoremove: yes
    autoclean: yes
    update_cache: yes
  become: yes

- name: Remove existing ROCm directory
  file:
    path: /opt/rocm
    state: absent
  become: yes

- name: Create apt keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: yes

- name: Download AMD ROCm repository key
  get_url:
    url: https://repo.radeon.com/rocm/rocm.gpg.key
    dest: /tmp/rocm.gpg.key
    mode: "0644"
  become: yes

- name: Install AMD ROCm repository keyring
  command:
    argv:
      - gpg
      - --dearmor
      - --yes
      - -o
      - "{{ rocm_repo_keyring }}"
      - /tmp/rocm.gpg.key
  become: yes

- name: Configure AMD ROCm 7 repositories
  copy:
    content: |
      deb [arch=amd64 signed-by={{ rocm_repo_keyring }}] https://repo.radeon.com/rocm/apt/{{ rocm_release }} noble main
      deb [arch=amd64 signed-by={{ rocm_repo_keyring }}] https://repo.radeon.com/graphics/{{ rocm_release }}/ubuntu noble main
    dest: "{{ rocm_repo_list }}"
    mode: "0644"
  become: yes

- name: Remove legacy ROCm apt preferences file
  file:
    path: /etc/apt/preferences.d/rocm
    state: absent
  become: yes

- name: Create ROCm apt preferences
  copy:
    content: |
      Package: *
      Pin: release o=repo.radeon.com
      Pin-Priority: 600
    dest: "{{ rocm_pin_file }}"
    mode: "0644"
  become: yes

- name: Refresh apt cache after ROCm repo changes
  apt:
    update_cache: yes
  become: yes

- name: Install ROCm packages for RX 7900 XT/XTX
  apt:
    name:
      - rocm
      - rocm-hip-sdk
      - rocblas
      - hipblas
      - hipblaslt
      - rocwmma-dev
    state: present
    update_cache: yes
  become: yes

- name: Remove obsolete ROCm environment overrides
  lineinfile:
    path: /etc/environment
    line: "{{ item }}"
    state: absent
  become: yes
  loop:
    - "ROC_ENABLE_PRE_VEGA=1"
    - "HIP_VISIBLE_DEVICES=0,1"

- name: Ensure ROCm install path is configured
  lineinfile:
    path: /etc/environment
    line: "{{ item }}"
    create: yes
  become: yes
  loop:
    - "ROCM_PATH=/opt/rocm"

# llama.cpp Installation - Always from scratch
- name: Remove existing llama.cpp directory
  file:
    path: /opt/llama.cpp
    state: absent
  become: yes

- name: Clone llama.cpp repository from latest HEAD
  git:
    repo: https://github.com/ggerganov/llama.cpp.git
    dest: /opt/llama.cpp
    version: HEAD
    force: yes
  become: yes

- name: Configure llama.cpp build with ROCm support
  command: cmake -B build -DGGML_HIP=ON -DGGML_OPENBLAS=OFF -DAMDGPU_TARGETS=gfx1100
  args:
    chdir: /opt/llama.cpp
  environment:
    ROCM_PATH: /opt/rocm
    HIP_PATH: /opt/rocm
    HIPCXX: "/opt/rocm/lib/llvm/bin/clang++"
    PATH: "/opt/rocm/bin:{{ ansible_env.PATH }}"
  become: yes

- name: Build llama.cpp with ROCm support
  command: cmake --build build -j{{ ansible_processor_vcpus }}
  args:
    chdir: /opt/llama.cpp
  environment:
    ROCM_PATH: /opt/rocm
    HIP_PATH: /opt/rocm
    HIPCXX: "/opt/rocm/lib/llvm/bin/clang++"
    PATH: "/opt/rocm/bin:{{ ansible_env.PATH }}"
  become: yes

# Additional monitoring tools
- name: Install additional monitoring tools
  apt:
    name:
      - htop
      - iotop
      - powertop
      - sysstat
      - s-tui
      - stress
    state: present
  become: yes

# btop Installation - Always from scratch
- name: Remove existing btop directory
  file:
    path: /opt/btop
    state: absent
  become: yes

- name: Clone btop repository from latest HEAD
  git:
    repo: https://github.com/aristocratos/btop.git
    dest: /opt/btop
    version: HEAD
    force: yes
  become: yes

- name: Build btop with AMD GPU support
  command:
    argv:
      - make
      - CXX=g++-14
      - GPU_SUPPORT=true
  args:
    chdir: /opt/btop
  become: yes

- name: Install btop
  command:
    argv:
      - make
      - install
  args:
    chdir: /opt/btop
  become: yes

# User permissions and system configuration
- name: Add user to render and video groups for GPU access
  user:
    name: system
    groups: render,video
    append: yes
  become: yes

# Create symlinks for easy access
# whisper.cpp Installation - Always from scratch
- name: Remove existing whisper.cpp directory
  file:
    path: /opt/whisper.cpp
    state: absent
  become: yes

- name: Clone whisper.cpp repository from latest HEAD
  git:
    repo: https://github.com/ggerganov/whisper.cpp.git
    dest: /opt/whisper.cpp
    version: HEAD
    force: yes
  become: yes

- name: Configure whisper.cpp build
  command: cmake -B build
  args:
    chdir: /opt/whisper.cpp
  become: yes

- name: Build whisper.cpp
  command: cmake --build build -j{{ ansible_processor_vcpus }}
  args:
    chdir: /opt/whisper.cpp
  become: yes

- name: Create symlinks in /usr/local/bin for easy access
  file:
    src: /opt/llama.cpp/build/bin/{{ item }}
    dest: /usr/local/bin/{{ item }}
    state: link
    force: yes
  become: yes
  loop:
    - llama-cli
    - llama-server

- name: Create whisper.cpp symlink in /usr/local/bin
  file:
    src: /opt/whisper.cpp/build/bin/main
    dest: /usr/local/bin/whisper-cpp
    state: link
    force: yes
  become: yes

- name: Verify btop installation
  command: /usr/local/bin/btop --version
  register: btop_version
  changed_when: false

# Verification
- name: Verify ROCm installation
  command: rocminfo
  register: rocm_info
  become: yes
  changed_when: false

- name: Check for gfx1100 GPU target
  shell: rocminfo | grep gfx | head -1
  register: gpu_target
  become: yes
  changed_when: false

- name: Display GPU target information
  debug:
    msg: "GPU Target: {{ gpu_target.stdout }}"
  when: gpu_target.stdout is defined

- name: Display installation completion status
  debug:
    msg: "Inference environment installation completed. All components built from latest sources."
